<div class="flex min-h-screen flex-col gap-6 bg-gradient-to-br from-slate-950 via-slate-950 to-cyan-950 px-6 py-10 text-slate-100">
	<div class="flex items-center justify-between">
		<div class="border-l-4 border-cyan-400/70 pl-3">
			<p class="text-[11px] uppercase tracking-[0.24em] text-cyan-200/80">Settings</p>
			<h1 class="text-3xl font-semibold text-white">Preferences</h1>
		</div>
		<span class="rounded-full border border-cyan-700/40 bg-cyan-900/60 px-4 py-2 text-xs font-semibold text-cyan-100 shadow-lg shadow-cyan-900/40">Live</span>
	</div>

	<div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
		<section class="rounded-2xl border border-cyan-900/50 bg-slate-900/70 p-5 shadow-xl ring-1 ring-cyan-800/40">
			<header class="mb-4 flex items-center justify-between">
				<div>
					<p class="text-xs uppercase tracking-[0.18em] text-cyan-200/80">Notifications</p>
					<h2 class="text-lg font-semibold text-white">Delivery channels</h2>
				</div>
				<span class="rounded-full bg-cyan-900/60 px-3 py-1 text-[11px] font-semibold text-cyan-100 ring-1 ring-cyan-700/40">3 toggles</span>
			</header>

			<div class="space-y-3">
				<label class="flex items-center justify-between rounded-xl border border-slate-800/80 bg-slate-950/40 px-4 py-3 text-sm">
					<div>
						<p class="font-semibold text-white">Email</p>
						<p class="text-xs text-slate-400">Receive summaries and alerts.</p>
					</div>
					<input type="checkbox" [(ngModel)]="notifications.email" class="h-4 w-4 accent-cyan-500" />
				</label>
				<label class="flex items-center justify-between rounded-xl border border-slate-800/80 bg-slate-950/40 px-4 py-3 text-sm">
					<div>
						<p class="font-semibold text-white">Push</p>
						<p class="text-xs text-slate-400">Instant notifications in app.</p>
					</div>
					<input type="checkbox" [(ngModel)]="notifications.push" class="h-4 w-4 accent-cyan-500" />
				</label>
				<label class="flex items-center justify-between rounded-xl border border-slate-800/80 bg-slate-950/40 px-4 py-3 text-sm">
					<div>
						<p class="font-semibold text-white">SMS</p>
						<p class="text-xs text-slate-400">Critical alerts only.</p>
					</div>
					<input type="checkbox" [(ngModel)]="notifications.sms" class="h-4 w-4 accent-cyan-500" />
				</label>
			</div>
		</section>

		<section class="rounded-2xl border border-cyan-900/50 bg-slate-900/70 p-5 shadow-xl ring-1 ring-cyan-800/40">
			<header class="mb-4 flex items-center justify-between">
				<div>
					<p class="text-xs uppercase tracking-[0.18em] text-cyan-200/80">Privacy</p>
					<h2 class="text-lg font-semibold text-white">Visibility</h2>
				</div>
			</header>
			<div class="space-y-4">
				<label class="block text-sm">
					<span class="text-slate-300">Profile visibility</span>
					<select [(ngModel)]="privacy.profileVisibility" class="mt-2 w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:border-cyan-600 focus:outline-none focus:ring-1 focus:ring-cyan-600">
						<option value="public">Public</option>
						<option value="team">Team</option>
						<option value="private">Only me</option>
					</select>
				</label>
				<label class="flex items-center justify-between rounded-xl border border-slate-800/80 bg-slate-950/40 px-4 py-3 text-sm">
					<div>
						<p class="font-semibold text-white">Search indexing</p>
						<p class="text-xs text-slate-400">Allow search engines to index.</p>
					</div>
					<input type="checkbox" [(ngModel)]="privacy.searchEngineIndexing" class="h-4 w-4 accent-cyan-500" />
				</label>
			</div>
		</section>
	</div>

	<section class="rounded-2xl border border-cyan-900/50 bg-slate-900/70 p-5 shadow-xl ring-1 ring-cyan-800/40">
		<header class="mb-4 flex items-center justify-between">
			<div>
				<p class="text-xs uppercase tracking-[0.18em] text-cyan-200/80">Appearance</p>
				<h2 class="text-lg font-semibold text-white">Theme & density</h2>
			</div>
		</header>
		<div class="grid gap-4 md:grid-cols-2">
			<label class="block text-sm">
				<span class="text-slate-300">Theme mode</span>
				<select [(ngModel)]="theme.mode" class="mt-2 w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:border-cyan-600 focus:outline-none focus:ring-1 focus:ring-cyan-600">
					<option value="light">Light</option>
					<option value="dark">Dark</option>
					<option value="system">System</option>
				</select>
			</label>
			<label class="block text-sm">
				<span class="text-slate-300">Density</span>
				<select [(ngModel)]="theme.density" class="mt-2 w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:border-cyan-600 focus:outline-none focus:ring-1 focus:ring-cyan-600">
					<option value="comfortable">Comfortable</option>
					<option value="compact">Compact</option>
					<option value="cozy">Cozy</option>
				</select>
			</label>
		</div>
	</section>
</div>
