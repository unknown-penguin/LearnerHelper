<div class="relative">
  <button
    type="button"
    (click)="toggleOpen()"
    class="flex w-full items-center justify-between rounded-xl border px-4 py-3 text-sm transition focus:outline-none focus:ring-1 focus:ring-primary-500/40"
    [class.border-primary-500]="isOpen()"
    [class.ring-1]="isOpen()"
    [class.ring-primary-500/40]="isOpen()"
    [class.border-primary-900/60]="!isOpen()"
    [class.bg-surface-950/70]="true"
    [class.text-surface-500]="!selectedLabel()"
    [class.text-surface-100]="!!selectedLabel()">
    <span class="truncate">{{ selectedLabel() || placeholder }}</span>
    <svg
      class="ml-2 h-4 w-4 shrink-0 text-surface-400 transition-transform"
      [class.rotate-180]="isOpen()"
      xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
    </svg>
  </button>

  @if(isOpen()) {
  <ul class="absolute z-50 mt-1.5 w-full overflow-hidden rounded-xl border border-primary-900/60 bg-surface-900 shadow-xl shadow-surface-950/60 ring-1 ring-primary-900/40">
    @if(showPlaceholderOption && placeholder) {
    <li class="px-4 py-2.5 text-sm text-surface-500 italic border-b border-primary-900/30 cursor-default">
      {{ placeholder }}
    </li>
    }
    @for(option of options; track option.value) {
    <li>
      <button
        type="button"
        (click)="selectOption(option)"
        class="flex w-full items-center justify-between px-4 py-2.5 text-sm transition hover:bg-primary-900/50"
        [class.text-primary-100]="option.value === value"
        [class.bg-primary-900/30]="option.value === value"
        [class.font-medium]="option.value === value"
        [class.text-surface-300]="option.value !== value">
        <span>{{ option.label }}</span>
        @if(option.value === value) {
        <svg class="h-4 w-4 text-primary-400 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
        </svg>
        }
      </button>
    </li>
    }
  </ul>
  }
</div>
