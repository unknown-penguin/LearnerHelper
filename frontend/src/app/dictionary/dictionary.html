<div class="flex min-h-screen flex-col gap-6 bg-gradient-to-br from-slate-950 via-slate-950 to-cyan-950 px-6 py-10 text-slate-100">
	<div class="flex items-center justify-between">
		<div class="border-l-4 border-cyan-400/70 pl-3">
			<p class="text-[11px] uppercase tracking-[0.24em] text-cyan-200/80">Dictionary</p>
			<h1 class="text-3xl font-semibold text-white">Curated Terms</h1>
		</div>
		<span class="rounded-full border border-cyan-500/40 bg-cyan-900/60 px-4 py-2 text-xs font-semibold text-cyan-100 shadow-lg shadow-cyan-900/40">{{ entries.length }} entries</span>
	</div>

	<div class="flex-1 overflow-hidden rounded-2xl border border-cyan-900/60 bg-slate-900/70 shadow-2xl ring-1 ring-cyan-700/40">
		<div class="overflow-x-auto">
			<table class="min-w-full text-left text-sm text-slate-200">
				<thead class="bg-slate-950/80 text-cyan-100">
					<tr class="border-b border-cyan-900/60">
						<th scope="col" class="px-5 py-3 font-semibold">Term</th>
						<th scope="col" class="px-5 py-3 font-semibold">Part of Speech</th>
						<th scope="col" class="px-5 py-3 font-semibold">Definition</th>
						<th scope="col" class="px-5 py-3 font-semibold">Example</th>
					</tr>
				</thead>
				<tbody>
					<tr
						*ngFor="let entry of entries; let i = index"
						class="border-b border-slate-800/60 bg-slate-900/40 hover:bg-cyan-900/40 hover:text-cyan-50 transition-colors"
					>
						<td class="px-5 py-4 text-base font-semibold text-white">{{ entry.term }}</td>
						<td class="px-5 py-4 capitalize text-slate-300">{{ entry.partOfSpeech }}</td>
						<td class="px-5 py-4 text-slate-100">{{ entry.definition }}</td>
						<td class="px-5 py-4 text-slate-200">
							<span class="inline-flex items-center rounded bg-cyan-900/70 px-2.5 py-1 text-[11px] font-semibold text-cyan-100 ring-1 ring-cyan-600/40">Example {{ i + 1 }}</span>
							<div class="mt-1 text-sm text-slate-100">{{ entry.example }}</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</div>
