<div class="flex flex-col gap-4">
	<div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
		<section class="rounded-2xl border border-primary-900/50 bg-surface-900/70 p-5 shadow-xl ring-1 ring-primary-800/40">
			<header class="mb-4 flex items-center justify-between">
				<div>
					<p class="text-xs uppercase tracking-[0.18em] text-primary-200/80">Notifications</p>
					<h2 class="text-lg font-semibold text-surface-100">Delivery channels</h2>
				</div>
				<span class="rounded-full bg-primary-900/60 px-3 py-1 text-[11px] font-semibold text-primary-100 ring-1 ring-primary-700/40">3 toggles</span>
			</header>

			<div class="space-y-3">
				<label class="flex items-center justify-between rounded-xl border border-surface-800/80 bg-surface-950/40 px-4 py-3 text-sm">
					<div>
						<p class="font-semibold text-surface-100">Email</p>
						<p class="text-xs text-surface-400">Receive summaries and alerts.</p>
					</div>
					<input type="checkbox" [(ngModel)]="notifications.email" class="h-4 w-4 accent-primary-500" />
				</label>
				<label class="flex items-center justify-between rounded-xl border border-surface-800/80 bg-surface-950/40 px-4 py-3 text-sm">
					<div>
						<p class="font-semibold text-surface-100">Push</p>
						<p class="text-xs text-surface-400">Instant notifications in app.</p>
					</div>
					<input type="checkbox" [(ngModel)]="notifications.push" class="h-4 w-4 accent-primary-500" />
				</label>
				<label class="flex items-center justify-between rounded-xl border border-surface-800/80 bg-surface-950/40 px-4 py-3 text-sm">
					<div>
						<p class="font-semibold text-surface-100">SMS</p>
						<p class="text-xs text-surface-400">Critical alerts only.</p>
					</div>
					<input type="checkbox" [(ngModel)]="notifications.sms" class="h-4 w-4 accent-primary-500" />
				</label>
			</div>
		</section>

		<section class="rounded-2xl border border-primary-900/50 bg-surface-900/70 p-5 shadow-xl ring-1 ring-primary-800/40">
			<header class="mb-4 flex items-center justify-between">
				<div>
					<p class="text-xs uppercase tracking-[0.18em] text-primary-200/80">Privacy</p>
					<h2 class="text-lg font-semibold text-surface-100">Visibility</h2>
				</div>
			</header>
			<div class="space-y-4">
				<label class="block text-sm">
					<span class="text-surface-300">Profile visibility</span>
					<select [(ngModel)]="privacy.profileVisibility" class="mt-2 w-full rounded-lg border border-surface-800 bg-surface-950 px-3 py-2 text-sm text-surface-100 focus:border-primary-600 focus:outline-none focus:ring-1 focus:ring-primary-600">
						<option value="public">Public</option>
						<option value="team">Team</option>
						<option value="private">Only me</option>
					</select>
				</label>
				<label class="flex items-center justify-between rounded-xl border border-surface-800/80 bg-surface-950/40 px-4 py-3 text-sm">
					<div>
						<p class="font-semibold text-surface-100">Search indexing</p>
						<p class="text-xs text-surface-400">Allow search engines to index.</p>
					</div>
					<input type="checkbox" [(ngModel)]="privacy.searchEngineIndexing" class="h-4 w-4 accent-primary-500" />
				</label>
			</div>
		</section>
	</div>

	<section class="rounded-2xl border border-primary-900/50 bg-surface-900/70 p-5 shadow-xl ring-1 ring-primary-800/40">
		<header class="mb-4 flex items-center justify-between">
			<div>
				<p class="text-xs uppercase tracking-[0.18em] text-primary-200/80">Appearance</p>
				<h2 class="text-lg font-semibold text-surface-100">Theme & density</h2>
			</div>
		</header>
		<div class="grid gap-4 md:grid-cols-2">
			<label class="block text-sm">
				<span class="text-surface-300">Color scheme</span>
				<select [ngModel]="themeService.current()" (ngModelChange)="themeService.set($event)" class="mt-2 w-full rounded-lg border border-surface-800 bg-surface-950 px-3 py-2 text-sm text-surface-100 focus:border-primary-600 focus:outline-none focus:ring-1 focus:ring-primary-600">
				@for(t of themeService.themes; track t.id) {
				<option [value]="t.id">{{ t.label }}</option>
				}
				</select>
			</label>
			<label class="block text-sm">
				<span class="text-surface-300">Density</span>
				<select [(ngModel)]="theme.density" class="mt-2 w-full rounded-lg border border-surface-800 bg-surface-950 px-3 py-2 text-sm text-surface-100 focus:border-primary-600 focus:outline-none focus:ring-1 focus:ring-primary-600">
					<option value="comfortable">Comfortable</option>
					<option value="compact">Compact</option>
					<option value="cozy">Cozy</option>
				</select>
			</label>
		</div>
	</section>
</div>
