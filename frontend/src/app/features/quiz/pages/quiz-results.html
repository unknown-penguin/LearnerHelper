<div
	class="flex min-h-screen flex-col gap-6 bg-gradient-to-br from-surface-950 via-surface-950 to-primary-950 px-6 py-10 text-surface-100"
	*transloco="let t; scope: 'quiz'; prefix: 'quiz'">
	<div class="flex items-center justify-between">
		<div class="border-l-4 border-primary-400/70 pl-3">
			<p class="text-[11px] uppercase tracking-[0.24em] text-primary-200/80">{{t('practice')}}</p>
			<h2 class="text-3xl font-semibold text-surface-100">{{t('results')}}</h2>
		</div>
	</div>

	<div class="flex flex-col items-center justify-center py-16">
		<div class="w-full max-w-2xl space-y-8">
			<div class="text-center space-y-4">
				<div class="text-6xl">
					@if(score() === total()) {
					🎉
					} @else if(score() >= total() * 0.7) {
					🎊
					} @else {
					📚
					}
				</div>
				<h3 class="text-3xl font-bold text-surface-100">{{t('result.complete')}}</h3>
				<p class="text-xl text-surface-300">
					{{t('result.youScored')}} <span class="font-semibold text-primary-400">{{ score() }}</span> {{t('result.outOf')}} <span
						class="font-semibold">{{ total() }}</span>
				</p>
				<div class="text-lg text-surface-200">
					{{ percentage() }}% {{t('result.correct')}}
				</div>
			</div>

			<div class="flex justify-center gap-4">
				<button (click)="retryQuiz()"
					class="rounded-full border border-primary-500/40 bg-primary-900/60 px-6 py-3 text-sm font-semibold text-primary-100 shadow-lg shadow-primary-900/40 transition hover:bg-primary-900/70">
					{{t('result.tryAgain')}}
				</button>
				<button (click)="resetQuiz()"
					class="rounded-full bg-primary-500 px-6 py-3 text-sm font-semibold text-surface-950 shadow-lg shadow-primary-500/30 transition hover:bg-primary-400">
					{{t('result.chooseAnother')}}
				</button>
			</div>
		</div>
	</div>
</div>
