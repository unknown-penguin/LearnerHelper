<div
	class="flex min-h-screen flex-col gap-6 bg-gradient-to-br from-surface-950 via-surface-950 to-primary-950 px-6 py-10 text-surface-100">
	<div class="flex items-center justify-between">
		<div class="border-l-4 border-primary-400/70 pl-3">
			<p class="text-[11px] uppercase tracking-[0.24em] text-primary-200/80">Dictionary</p>
			<div class="relative">
				<button (click)="toggleDropdown()"
					class="flex items-center gap-2 text-3xl font-semibold text-surface-100 hover:text-primary-50 transition-colors group">
					@if(dictionaryState.selectedDictionary(); as dict) {
					<span>{{ dict.name }}</span>
					} @else {
					<span class="text-surface-100/50">No Dictionary Selected</span>
					}
					<svg class="h-6 w-6 transition-transform text-primary-400 group-hover:text-primary-300" [class.rotate-180]="isDropdownOpen()" xmlns="http://www.w3.org/2000/svg"
						viewBox="0 0 20 20" fill="currentColor">
						<path fill-rule="evenodd"
							d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
							clip-rule="evenodd" />
					</svg>
				</button>
				@if(isDropdownOpen()) {
				<div
					class="absolute left-0 mt-2 w-64 origin-top-left rounded-lg border border-primary-900/60 bg-surface-900/95 shadow-2xl ring-1 ring-primary-700/40 z-10">
					<div class="py-1">
						@if(dictionaryState.allDictionaries().length === 0) {
						<div class="px-4 py-3 text-xs text-surface-400">No dictionaries available</div>
						} @else {
						@for (dict of dictionaryState.allDictionaries(); track dict.id) {
						<button (click)="selectDictionary(dict.id)"
							class="flex w-full items-center justify-between px-4 py-2 text-sm text-surface-200 hover:bg-primary-900/40 hover:text-primary-50 transition-colors"
							[class.bg-primary-900/60]="dict.id === dictionaryState.currentDictionaryId()">
							<span>{{ dict.name }}</span>
						@if(dict.wordCount !== undefined) {
							<span class="text-xs text-surface-400">{{ dict.wordCount }} words</span>
							}
						</button>
						}
						}
					</div>
				</div>
				}
			</div>
		</div>
		<div class="flex items-center gap-4">
			<span
				class="rounded-full border border-primary-500/40 bg-primary-900/60 px-4 py-2 text-xs font-semibold text-primary-100 shadow-lg shadow-primary-900/40">{{
				entries().length }} entries</span>
			<button (click)="openNewEntryForm()"
				class="rounded-full border border-primary-500/40 bg-primary-900/60 px-4 py-2 text-xs font-semibold text-primary-100 shadow-lg shadow-primary-900/40 transition hover:bg-primary-900/70">
				+ New
			</button>
		</div>
	</div>

	<app-data-table 
		[columns]="columns" 
		[rows]="entries()" 
		[minWidth]="'1200px'"
		[emptyMessage]="'No entries found. Add your first word!'"
		(rowClick)="openEditForm($event)">
		<ng-template #cellTemplate let-row let-col="column">
			@if(col.field === 'languageLevel') {
			<app-level-label [level]="row.languageLevel"></app-level-label>
			}
		</ng-template>
	</app-data-table>

	<app-create-edit-form [entry]="selectedEntry" [isOpen]="isFormOpen" [language]="dictionaryLanguage()" (save)="handleSave($event)" (delete)="handleDelete($event)" (cancel)="closeForm()"></app-create-edit-form>
</div>
