<div
	class="flex min-h-screen flex-col gap-6 bg-gradient-to-br from-surface-950 via-surface-950 to-primary-950 px-6 py-10 text-surface-100">
	<div class="flex items-center justify-between">
		<div class="border-l-4 border-primary-400/70 pl-3">
			<p class="text-[11px] uppercase tracking-[0.24em] text-primary-200/80">Dictionary</p>
			<h1 class="text-3xl font-semibold text-white">Curated Terms</h1>
		</div>
		<div class="flex items-center gap-4">
			<span
				class="rounded-full border border-primary-500/40 bg-primary-900/60 px-4 py-2 text-xs font-semibold text-primary-100 shadow-lg shadow-primary-900/40">{{
				entries().length }} entries</span>
			<button (click)="openNewEntryForm()"
				class="rounded-full border border-primary-500/40 bg-primary-900/60 px-4 py-2 text-xs font-semibold text-primary-100 shadow-lg shadow-primary-900/40 transition hover:bg-primary-900/70">
				+ New
			</button>
		</div>
	</div>

	<div
		class="flex-1 overflow-hidden rounded-2xl border border-primary-900/60 bg-surface-900/70 shadow-2xl ring-1 ring-primary-700/40">
		<div class="overflow-x-auto">
			<table class="min-w-full text-left text-sm text-surface-200 bg-surface-950/80 text-primary-100">
				<thead class="bg-surface-950/80 text-primary-100">
					<tr class="border-b border-primary-900/60">
						<th scope="col" class="px-5 py-3 font-semibold">Word</th>
						<th scope="col" class="px-5 py-3 font-semibold">Part of Speech</th>
						<th scope="col" class="px-5 py-3 font-semibold">Definition</th>
						<th scope="col" class="px-5 py-3 font-semibold">Language</th>
						<th scope="col" class="px-5 py-3 font-semibold">Level</th>
					</tr>
				</thead>
				<tbody class="bg-surface-950/80">
					@if(!entries().length) {
					<tr class="border-b border-surface-800/60 bg-surface-900/40">
						<td colspan="5" class="px-5 py-4 text-center text-sm text-surface-500">No entries found. Add your
							first word!</td>
					</tr>
					}
					@else {
					<tr *ngFor="let entry of entries(); let i = index"
						class="border-b border-surface-800/60 bg-surface-900/40 hover:bg-primary-900/40 hover:text-primary-50 transition-colors">
						<td class="px-5 py-4 text-base font-semibold text-white">{{ entry.word }}</td>
						<td class="px-5 py-4 capitalize text-surface-300">{{ entry.partOfSpeech }}</td>
						<td class="px-5 py-4 text-surface-100">{{ entry.definition }}</td>
						<td class="px-5 py-4 text-surface-200">
							<span
								class="inline-flex items-center rounded bg-primary-900/70 px-2.5 py-1 text-[11px] font-semibold text-primary-100 ring-1 ring-primary-600/40">{{
								entry.language }}</span>

						</td>
						<td class="px-5 py-4">
							<app-level-label [level]="entry.languageLevel"></app-level-label>
						</td>
					</tr>
					}
				</tbody>
			</table>
		</div>
	</div>

	<app-create-edit-form [isOpen]="isFormOpen" (cancel)="closeForm()"></app-create-edit-form>
	<!-- [entry]="selectedEntry"
		(save)="handleSave($event)" -->
</div>
