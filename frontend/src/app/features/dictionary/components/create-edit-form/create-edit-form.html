@if(isOpen) {
<div class="fixed inset-0 z-40" *transloco="let t; scope: 'dictionary'; prefix: 'dictionary'">
	<div class="absolute inset-0 bg-surface-950/80 backdrop-blur-sm" (click)="onCancel()"></div>
	<div class="relative z-10 flex min-h-full items-center justify-center px-4 py-10" (click)="onCancel()">
		<section role="dialog" aria-modal="true"
			class="w-full max-w-3xl rounded-2xl border border-primary-900/60 bg-surface-950/90 p-6 text-surface-100 shadow-2xl"
			(click)="$event.stopPropagation()">
			<header class="flex flex-wrap items-center justify-between gap-4 border-b border-primary-900/50 pb-4">
				<div>
					<p class="text-[11px] uppercase tracking-[0.32em] text-primary-200/70">{{t('form.label')}}</p>
					<h2 class="text-2xl font-semibold text-surface-100">{{ isEditing ? t('form.updateTerm') : t('form.createTerm') }}</h2>
				</div>
				<app-level-label [level]="form.controls.languageLevel.value"></app-level-label>
			</header>

			<form class="mt-6 space-y-5" [formGroup]="form" (ngSubmit)="onSubmit()">
				<div class="grid gap-5 md:grid-cols-2">
					<label class="space-y-2">
						<span class="text-xs font-semibold uppercase tracking-[0.2em] text-primary-200/80">{{t('form.word')}}</span>
						<input type="text" formControlName="word" [placeholder]="t('form.wordPlaceholder')"
							class="w-full rounded-xl border border-primary-900/60 bg-surface-950/70 px-4 py-3 text-sm text-surface-100 placeholder:text-surface-500 focus:border-primary-500 focus:outline-none" />
						@if(form.controls.word.touched && form.controls.word.invalid) {
						<span class="text-xs text-danger-300">
							{{t('form.wordRequired')}}
						</span>
						}
					</label>

					<label class="space-y-2">
						<span class="text-xs font-semibold uppercase tracking-[0.2em] text-primary-200/80">{{t('form.partOfSpeech')}}</span>
						<app-custom-select
							formControlName="partOfSpeech"
							[options]="partOfSpeechSelectOptions">
						</app-custom-select>
					</label>
				</div>

				<label class="space-y-2">
					<span class="text-xs font-semibold uppercase tracking-[0.2em] text-primary-200/80">{{t('form.definition')}}</span>
					<textarea rows="4" formControlName="definition" [placeholder]="t('form.definitionPlaceholder')"
						class="w-full rounded-xl border border-primary-900/60 bg-surface-950/70 px-4 py-3 text-sm text-surface-100 placeholder:text-surface-500 focus:border-primary-500 focus:outline-none"></textarea>
					@if(form.controls.definition.touched && form.controls.definition.invalid) {
					<span class="text-xs text-danger-300">
						{{t('form.definitionRequired')}}
					</span>
					}
				</label>

				<div class="grid gap-5 md:grid-cols-2">
					<label class="space-y-2">
						<span class="text-xs font-semibold uppercase tracking-[0.2em] text-primary-200/80">{{t('form.languageLevel')}}</span>
						<app-custom-select
							formControlName="languageLevel"
						[options]="languageLevelSelectOptions">
						</app-custom-select>
					</label>

					<label class="space-y-2">
						<span
							class="text-xs font-semibold uppercase tracking-[0.2em] text-primary-200/80">{{t('form.language')}}</span>
						<div
							class="w-full rounded-xl border border-primary-900/60 bg-surface-950/70 px-4 py-3 text-sm text-surface-100">
							{{ language || '—' }}
						</div>
					</label>
				</div>

				<footer class="flex flex-wrap items-center justify-between gap-4 pt-4">
					<div class="flex items-center gap-2">
						<button type="button"
							class="rounded-full border border-surface-700/70 px-5 py-2 text-sm font-semibold text-surface-200 transition hover:border-surface-500 hover:text-surface-100"
							(click)="onCancel()">
							{{t('form.cancel')}}
						</button>
						@if(isEditing) {
						<button type="button"
							class="rounded-full border border-danger-700/50 px-5 py-2 text-sm font-semibold text-danger-300 transition hover:bg-danger-900/50 hover:text-surface-100"
							(click)="onDelete()">
								{{t('form.delete')}}
						</button>
						}
					</div>
					<button type="submit"
						class="rounded-full bg-primary-500 px-6 py-2 text-sm font-semibold text-surface-950 shadow-lg shadow-primary-500/30 transition hover:bg-primary-400">
						{{ isEditing ? t('form.updateTerm') : t('form.createTerm') }}
					</button>
				</footer>
			</form>
		</section>
	</div>
</div>
}
