<div class="fixed inset-0 z-40" *transloco="let t; scope: 'auth'; prefix: 'auth'">
    <div class="absolute inset-0 bg-surface-950/80 backdrop-blur-sm" (click)="close()"></div>
    <div class="relative z-10 flex min-h-full items-center justify-center px-4 py-10" (click)="close()">
        <section role="dialog" aria-modal="true"
            class="w-full max-w-sm rounded-2xl border border-primary-900/60 bg-surface-950/90 p-6 text-surface-100 shadow-2xl"
            (click)="$event.stopPropagation()">

            <header class="flex items-center justify-between border-b border-primary-900/50 pb-4">
                <div class="border-l-4 border-primary-400/70 pl-3">
                    <p class="text-[11px] uppercase tracking-[0.32em] text-primary-200/70">{{t('welcomeBack')}}</p>
                    <h2 class="text-2xl font-semibold text-surface-100">{{t('signIn')}}</h2>
                </div>
                <button (click)="close()"
                    class="rounded-lg p-1.5 text-surface-400 transition-colors hover:bg-primary-900/40 hover:text-surface-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                            clip-rule="evenodd" />
                    </svg>
                </button>
            </header>

            <app-login-form [showCancel]="true" (loggedIn)="close()" (cancelled)="close()"></app-login-form>
        </section>
    </div>
</div>
