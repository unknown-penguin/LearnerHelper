<ng-container *transloco="let t; scope: 'auth'; prefix: 'auth'">
    @if (error()) {
    <div class="mt-4 rounded-lg border border-danger-700/40 bg-danger-900/30 p-3 text-sm text-danger-300">
        {{ error() }}
    </div>
    }

    <form class="mt-6 space-y-5" (ngSubmit)="submit()">
        <label class="space-y-2 block">
            <span class="text-xs font-semibold uppercase tracking-[0.2em] text-primary-200/80">{{t('email')}}</span>
            <input type="email" [(ngModel)]="email" name="email" required autocomplete="email"
                class="w-full rounded-xl border border-primary-900/60 bg-surface-950/70 px-4 py-3 text-sm text-surface-100 placeholder:text-surface-500 focus:border-primary-500 focus:outline-none" />
        </label>

        <label class="space-y-2 block">
            <span class="text-xs font-semibold uppercase tracking-[0.2em] text-primary-200/80">{{t('password')}}</span>
            <input type="password" [(ngModel)]="password" name="password" required autocomplete="current-password"
                class="w-full rounded-xl border border-primary-900/60 bg-surface-950/70 px-4 py-3 text-sm text-surface-100 placeholder:text-surface-500 focus:border-primary-500 focus:outline-none" />
        </label>

        <footer class="pt-2" [class.flex]="showCancel()" [class.items-center]="showCancel()"
            [class.justify-between]="showCancel()" [class.gap-4]="showCancel()">
            @if (showCancel()) {
            <button type="button"
                class="rounded-full border border-surface-700/70 px-5 py-2 text-sm font-semibold text-surface-200 transition hover:border-surface-500 hover:text-surface-100"
                (click)="cancel()">{{t('cancel')}}
            </button>
            }
            <button type="submit" [disabled]="loading()"
                class="flex items-center gap-2 rounded-full bg-primary-500 px-6 py-2 text-sm font-semibold text-surface-950 shadow-lg shadow-primary-500/30 transition hover:bg-primary-400 disabled:opacity-50 disabled:cursor-not-allowed"
                [class.w-full]="!showCancel()" [class.justify-center]="!showCancel()">
                @if (loading()) {
                <svg class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />
                </svg>
                }
                {{t('signIn')}}
            </button>
        </footer>
    </form>
</ng-container>
